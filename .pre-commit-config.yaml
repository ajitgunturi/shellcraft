repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: ^(setup-my-mac\.sh|lib/.*\.sh)$
      - id: shfmt
        name: shfmt
        entry: shfmt -d
        language: system
        files: ^(setup-my-mac\.sh|lib/.*\.sh|tests/.*\.bats)$
      - id: markdownlint
        name: markdownlint
        entry: markdownlint
        language: system
        types: [markdown]
      - id: actionlint
        name: actionlint
        entry: bash -lc 'if rg --files .github/workflows -g "*.yml" -g "*.yaml" >/dev/null 2>&1; then actionlint; else echo "actionlint skipped"; fi'
        language: system
        pass_filenames: false
      - id: yamllint
        name: yamllint
        entry: bash -lc 'if rg --files . -g "*.yml" -g "*.yaml" >/dev/null 2>&1; then yamllint .; else echo "yamllint skipped"; fi'
        language: system
        pass_filenames: false
      - id: hadolint
        name: hadolint
        entry: bash -lc 'if rg --files . -g "Dockerfile*" >/dev/null 2>&1; then hadolint Dockerfile*; else echo "hadolint skipped"; fi'
        language: system
        pass_filenames: false
